<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Please sign in</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="text-center" style="background-color: #f5f5f5;">
<main class="form-signin" style="width: 100%; max-width: 330px; padding: 15px; margin: auto; margin-top: 100px;">
    <form th:action="@{/login}" method="post">
        <h1 class="h3 mb-3 fw-normal">Please sign in</h1>

        <div class="form-floating mb-2">
            <input type="email" class="form-control" id="email" name="username" placeholder="Email address" required autofocus>
            <label for="email">Email address</label>
        </div>

        <div class="form-floating mb-3">
            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
            <label for="password">Password</label>
        </div>

        <button class="w-100 btn btn-lg btn-primary" type="submit">Sign in</button>

        <div th:if="${param.error}" class="alert alert-danger mt-3">
            Invalid email or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-info mt-3">
            You have been signed out.
        </div>
    </form>
</main>
</body>
</html>
