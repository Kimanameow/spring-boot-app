<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Admin Panel</span>
        <div class="d-flex">
            <span class="navbar-text me-3" id="currentUserEmail"></span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Users Table</h2>
        <button class="btn btn-success" onclick="openAddModal()">
            <i class="bi bi-person-plus"></i> New User
        </button>
    </div>

    <div class="card">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">All users</h4>
        </div>
        <div class="card-body">
            <table class="table table-striped table-bordered">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Roles</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="usersTableBody">
                <tr>
                    <td colspan="6" class="text-center">Loading...</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Модальное окно для добавления/редактирования -->
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="userForm">
                    <input type="hidden" id="userId">
                    <div class="mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control" id="firstName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="lastName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="password">
                        <small class="text-muted" id="passwordHint">Leave blank to keep current password</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Roles</label>
                        <div id="rolesCheckboxes">
                            <!-- Роли загружаются через JS -->
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" onclick="saveUser()">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let allRoles = [];
    let currentUserId = null;
    let userModal = null;

    // Загрузка текущего пользователя
    async function loadCurrentUser() {
        try {
            const response = await fetch('/user');
            const user = await response.json();
            document.getElementById('currentUserEmail').textContent = 'Welcome, ' + user.email;
        } catch (error) {
            console.error('Error loading current user:', error);
        }
    }

    // Загрузка всех ролей
    async function loadRoles() {
        try {
            const response = await fetch('/admin/roles');
            allRoles = await response.json();
            const rolesContainer = document.getElementById('rolesCheckboxes');
            rolesContainer.innerHTML = allRoles.map(role => `
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" value="${role.id}" id="role_${role.id}">
                    <label class="form-check-label" for="role_${role.id}">${role.name.replace('ROLE_', '')}</label>
                </div>
            `).join('');
        } catch (error) {
            console.error('Error loading roles:', error);
        }
    }

    // Загрузка всех пользователей
    async function loadUsers() {
        try {
            const response = await fetch('/admin');
            const users = await response.json();
            const tbody = document.getElementById('usersTableBody');
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center">No users found</td></tr>';
                return;
            }
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.id}</td>
                    <td>${user.name || ''}</td>
                    <td>${user.surname || ''}</td>
                    <td>${user.email}</td>
                    <td>${user.roles.map(r => r.name.replace('ROLE_', '')).join(', ')}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="openEditModal(${user.id})">
                            <i class="bi bi-pencil"></i> Edit
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})">
                            <i class="bi bi-trash"></i> Delete
                        </button>
                    </td>
                </tr>
            `).join('');
        } catch (error) {
            console.error('Error loading users:', error);
        }
    }

    // Открыть модальное окно для добавления
    function openAddModal() {
        document.getElementById('modalTitle').textContent = 'Add User';
        document.getElementById('userForm').reset();
        document.getElementById('userId').value = '';
        document.getElementById('password').required = true;
        document.getElementById('passwordHint').style.display = 'block';
        document.querySelectorAll('#rolesCheckboxes input').forEach(cb => cb.checked = false);
        currentUserId = null;
        userModal.show();
    }

    // Открыть модальное окно для редактирования
    async function openEditModal(id) {
        try {
            const response = await fetch(`/admin/users/${id}`);
            const user = await response.json();

            document.getElementById('modalTitle').textContent = 'Edit User';
            document.getElementById('userId').value = user.id;
            document.getElementById('firstName').value = user.name || '';
            document.getElementById('lastName').value = user.surname || '';
            document.getElementById('email').value = user.email;
            document.getElementById('password').value = '';
            document.getElementById('password').required = false;
            document.getElementById('passwordHint').style.display = 'block';

            document.querySelectorAll('#rolesCheckboxes input').forEach(cb => {
                const roleId = parseInt(cb.value);
                cb.checked = user.roles.some(r => r.id === roleId);
            });

            currentUserId = user.id;
            userModal.show();
        } catch (error) {
            console.error('Error loading user:', error);
        }
    }

    // Сохранить пользователя
    async function saveUser() {
        const user = {
            name: document.getElementById('firstName').value,
            surname: document.getElementById('lastName').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        const selectedRoleIds = Array.from(document.querySelectorAll('#rolesCheckboxes input:checked'))
            .map(cb => parseInt(cb.value));

        const isEdit = currentUserId !== null;
        let url = '/admin';
        let method = 'POST';

        if (isEdit) {
            url = `/admin/users/${currentUserId}`;
            method = 'PUT';
        }

        let fullUrl = url;
        if (selectedRoleIds.length > 0) {
            fullUrl += '?roleIds=' + selectedRoleIds.join('&roleIds=');
        }

        try {
            const response = await fetch(fullUrl, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(user)
            });

            if (response.ok) {
                userModal.hide();
                await loadUsers();
                document.getElementById('userForm').reset();
            } else {
                alert('Error saving user');
            }
        } catch (error) {
            console.error('Error saving user:', error);
            alert('Error saving user');
        }
    }

    // Удалить пользователя
    async function deleteUser(id) {
        if (confirm('Are you sure you want to delete this user?')) {
            try {
                const response = await fetch(`/admin/users/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    await loadUsers();
                } else {
                    alert('Error deleting user');
                }
            } catch (error) {
                console.error('Error deleting user:', error);
                alert('Error deleting user');
            }
        }
    }

    // Инициализация
    document.addEventListener('DOMContentLoaded', async () => {
        userModal = new bootstrap.Modal(document.getElementById('userModal'));
        await loadCurrentUser();
        await loadRoles();
        await loadUsers();
    });
</script>
</body>
</html>
