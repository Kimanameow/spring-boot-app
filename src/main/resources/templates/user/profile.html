<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">User Profile</span>
        <div class="d-flex">
            <span class="navbar-text me-3">Welcome, <span th:text="${#authentication.name}"></span></span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-info text-white">
                    <h3 class="mb-0">Your Profile</h3>
                </div>
                <div class="card-body">
                    <table class="table table-bordered">
                        <tr>
                            <th class="bg-light">Name:</th>
                            <td th:text="${user.name}"></td>
                        </tr>
                        <tr>
                            <th class="bg-light">Surname:</th>
                            <td th:text="${user.surname}"></td>
                        </tr>
                        <tr>
                            <th class="bg-light">Email:</th>
                            <td th:text="${user.email}"></td>
                        </tr>
                        <tr>
                            <th class="bg-light">Roles:</th>
                            <td>
                                <span th:each="role : ${user.roles}" class="badge bg-primary me-1" th:text="${role.name}"></span>
                            </td>
                        </tr>
                    </table>
                    <div class="mt-3 text-center">
                        <a th:href="@{/admin}" class="btn btn-warning" sec:authorize="hasRole('ADMIN')">Go to Admin Panel</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
