<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">Admin Panel - Edit User</span>
            <div class="d-flex">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h3 class="mb-0">Edit User</h3>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/edit}" th:object="${user}" method="post">
                            <input type="hidden" th:field="*{id}">
                            <div class="mb-3">
                                <label class="form-label">Name:</label>
                                <input type="text" class="form-control" th:field="*{name}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Surname:</label>
                                <input type="text" class="form-control" th:field="*{surname}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email:</label>
                                <input type="email" class="form-control" th:field="*{email}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password:</label>
                                <input type="password" class="form-control" th:field="*{password}">
                                <small class="text-muted">Leave blank to keep current password</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Roles:</label>
                                <div th:each="role : ${allRoles}">
                                    <div class="form-check">
                                        <input type="checkbox" class="form-check-input"
                                               th:name="roleIds"
                                               th:value="${role.id}"
                                               th:id="${'role_' + role.id}"
                                               th:checked="${user.roles.contains(role)}">
                                        <label class="form-check-label" th:for="${'role_' + role.id}" th:text="${role.name}"></label>
                                    </div>
                                </div>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">Update</button>
                                <a th:href="@{/admin}" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
