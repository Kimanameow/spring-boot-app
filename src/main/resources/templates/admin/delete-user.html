<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Delete user</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Admin panel</span>
        <div class="d-flex">
            <span class="navbar-text me-3">Welcome, <span th:text="${#authentication.name}"></span></span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">Delete user</h4>
                    <small th:text="${user.email} + ' with roles: ' + ${user.roles}"></small>
                </div>
                <div class="card-body">
                    <div class="alert alert-warning">
                        Are you sure you want to delete this user?
                    </div>
                    <table class="table">
                        <tr>
                            <th>ID:</th>
                            <td th:text="${user.id}"></td>
                        </tr>
                        <tr>
                            <th>First name:</th>
                            <td th:text="${user.name}"></td>
                        </tr>
                        <tr>
                            <th>Last name:</th>
                            <td th:text="${user.surname}"></td>
                        </tr>
                        <tr>
                            <th>Age:</th>
                            <td th:text="${user.age}"></td>
                        </tr>
                        <tr>
                            <th>Email:</th>
                            <td th:text="${user.email}"></td>
                        </tr>
                        <tr>
                            <th>Role:</th>
                            <td>
                                    <span th:each="role : ${user.roles}" class="badge bg-primary me-1"
                                          th:text="${role.name.replace('ROLE_', '')}"></span>
                            </td>
                        </tr>
                    </table>
                    <div class="d-flex gap-2">
                        <a th:href="@{/admin/delete/confirm/{id}(id=${user.id})}" class="btn btn-danger">Delete</a>
                        <a th:href="@{/admin}" class="btn btn-secondary">Close</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-info text-white">
                    <h4 class="mb-0">Table</h4>
                </div>
                <div class="card-body">
                    <table class="table table-sm">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="u : ${users}">
                            <td th:text="${u.id}"></td>
                            <td th:text="${u.name}"></td>
                            <td th:text="${u.surname}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
